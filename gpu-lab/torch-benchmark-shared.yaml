apiVersion: batch/v1
kind: Job
metadata:
  name: torch-benchmark
  namespace: gpu-lab
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: torch-benchmark
        mode: shared
    spec:
      restartPolicy: Never
      containers:
        - name: benchmark
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
          command:
            - python
            - -c
            - |
              import torch, time

              print(f"имя GPU: {torch.cuda.get_device_name(0)}")
              print(f"объем GPU memory: {torch.cuda.get_device_properties(0).total_memory / (1024**3):.2f} GB")

              size = 20_000
              A = torch.randn(size, size, device='cuda')
              B = torch.randn(size, size, device='cuda')

              steps = 30
              times = []

              # Прогрев
              for _ in range(5):
                  C = torch.matmul(A, B)
              torch.cuda.synchronize()

              # Основной цикл
              for _ in range(steps):
                  start = time.time()
                  C = torch.matmul(A, B)
                  torch.cuda.synchronize()
                  times.append(time.time() - start)

              print(f"avg_step_sec: {sum(times)/len(times):.4f}")
              print(f"min_step_sec: {min(times):.4f}")
              print(f"max_step_sec: {max(times):.4f}")
              print(f"peak_cuda_mem_gb: {torch.cuda.max_memory_allocated() / (1024**3):.4f}")

          resources:
            limits:
              nvidia.com/gpu.shared: "1"